name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
      with:
        php-version: '8.0'
    - uses: actions/checkout@v4
    - name: Copy .env
      run: cd Ativitat_3_5/Ativitat_3_1_base && php -r "file_exists('.env') || copy('.env.example', '.env');"
    - name: Install Dependencies
      run: cd Ativitat_3_5/Ativitat_3_1_base && composer update && composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Generate key
      run: cd Ativitat_3_5/Ativitat_3_1_base && php artisan key:generate
    - name: Directory Permissions
      run: cd Ativitat_3_5/Ativitat_3_1_base && chmod -R 777 storage bootstrap/cache
